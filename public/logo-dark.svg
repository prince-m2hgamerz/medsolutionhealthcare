<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90" role="img" aria-label="Med Solution Healthcare Logo">
  <defs>
    <linearGradient id="L2shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="L2leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M40 8 L64 8 Q70 8 70 14 L70 44 Q70 64 52 74 Q34 64 34 44 L34 14 Q34 8 40 8 Z"
    fill="url(#L2shield)"/>

  <!-- Leaf inside shield -->
  <path d="M52 62 Q52 42 62 30 Q50 28 42 38 Q38 48 52 62 Z" fill="url(#L2leaf)" opacity="0.95"/>
  <!-- Stem -->
  <line x1="52" y1="62" x2="52" y2="38" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Leaf vein -->
  <path d="M52 52 Q57 46 62 30" fill="none" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="84" y="36" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="700" fill="#F8FAFC" letter-spacing="-0.4">Med Solution</text>
  <text x="84" y="54" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="300" fill="#0EA5E9" letter-spacing="4">HEALTHCARE</text>
</svg>
